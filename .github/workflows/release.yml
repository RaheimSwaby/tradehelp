name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  build:
    needs: test
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      # Windows and Linux get no Apple credentials at all — electron-builder also reads
      # CSC_LINK for Windows signing, so handing it the Apple .p12 would fail that build.
      - name: Build & publish installer
        if: matrix.os != 'macos-latest'
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish installer (macOS, signed + notarised)
        if: matrix.os == 'macos-latest'
        shell: bash
        # A secret pasted through the GitHub UI can carry a trailing newline. Apple's
        # notary service then rejects it with "HTTP 401 Invalid credentials", which reads
        # like a wrong password and cost a release to track down — the credentials were
        # correct, the newline was not. Strip CR/LF before electron-builder sees them.
        run: |
          export APPLE_ID="$(printf '%s' "$APPLE_ID" | tr -d '\r\n')"
          export APPLE_APP_SPECIFIC_PASSWORD="$(printf '%s' "$APPLE_APP_SPECIFIC_PASSWORD" | tr -d '\r\n')"
          export APPLE_TEAM_ID="$(printf '%s' "$APPLE_TEAM_ID" | tr -d '\r\n')"
          npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo RaheimSwaby/tradehelp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
