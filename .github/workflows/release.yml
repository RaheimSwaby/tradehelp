name: Release

# Push a version tag (e.g. v0.2.0) and this runs the tests, builds the installers,
# and publishes them to a GitHub Release (the feed electron-updater reads).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  build:
    needs: test
    strategy:
      # Serialized so the platform jobs don't race to create the GitHub release
      # (concurrent --publish would split assets across duplicate draft releases).
      # The first job creates the draft; the rest append to it.
      max-parallel: 1
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        # macOS builds are UNSIGNED (mac.identity=null) — users run `xattr -cr
        # /Applications/TradeHelp.app` once to open. Add Apple signing/notarization
        # secrets later for a clean double-click install.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Build & publish installer
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-notes:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Add auto-generated release notes
        run: gh release edit ${{ github.ref_name }} --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
